# ==================== 服务器配置 ====================
server:
  port: 8080  # 后端服务端口

# ==================== 数据源配置 ====================
spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456  # 请根据实际数据库密码修改

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml  # Mapper XML 文件位置
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名转换（如 user_name -> userName）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启SQL日志（开发环境使用）
  global-config:
    db-config:
      id-type: auto  # 主键自增策略
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1  # 逻辑删除值
      logic-not-delete-value: 0  # 逻辑未删除值

# ==================== JWT 配置 ====================
jwt:
  secret: PetBlogSystemSecretKey2024  # JWT 签名密钥（生产环境应使用更复杂的密钥）
  expiration: 86400000  # Token 过期时间：24小时（毫秒）

# ==================== 文件上传配置 ====================
upload:
  path: ./uploads/  # 文件上传存储路径
